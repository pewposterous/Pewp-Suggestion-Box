<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Character Suggestions</title>

<!-- Firebase SDK (compat for simplicity) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1014;
    --surface: #1a1b22;
    --surface-hover: #22232e;
    --border: #2a2b38;
    --border-accent: #3d3e50;
    --text: #e2e0dc;
    --text-muted: #7c7b85;
    --accent: #c8a46e;
    --accent-glow: #c8a46e33;
    --danger: #a0404080;
    --danger-solid: #c05050;
    --upvote-bg: #c8a46e18;
    --upvote-active: #c8a46e30;
    --gold: #d4a847;
    --silver: #b7b7b7;
    --bronze: #cd7f32;
    --radius: 10px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 640px;
    margin: 0 auto;
    padding: 3rem 1.25rem 4rem;
  }

  /* ── Header ── */
  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }
  header h1 {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-size: 2.4rem;
    letter-spacing: -0.02em;
    color: var(--accent);
    margin-bottom: 0.35rem;
  }
  header p {
    color: var(--text-muted);
    font-size: 0.92rem;
  }

  /* ── Submit form ── */
  .submit-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 2rem;
  }
  .submit-row input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.7rem 1rem;
    color: var(--text);
    font-family: inherit;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .submit-row input::placeholder { color: var(--text-muted); }
  .submit-row input:focus { border-color: var(--accent); }

  .submit-row button {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: var(--radius);
    padding: 0.7rem 1.3rem;
    font-family: inherit;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.2s;
  }
  .submit-row button:hover { opacity: 0.85; }
  .submit-row button:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Status bar ── */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
    font-size: 0.82rem;
    color: var(--text-muted);
  }
  .status-bar .count { font-variant-numeric: tabular-nums; }

  .admin-toggle {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 6px;
    padding: 0.3rem 0.7rem;
    font-family: inherit;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .admin-toggle:hover { border-color: var(--accent); color: var(--accent); }
  .admin-toggle.active {
    border-color: var(--accent);
    background: var(--accent-glow);
    color: var(--accent);
  }

  /* ── Auth icon (top-right) ── */
  .auth-icon {
    position: fixed;
    top: 1rem;
    right: 1rem;
    width: 36px;
    height: 36px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50%;
    color: var(--text-muted);
    font-size: 1rem;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    z-index: 50;
  }
  .auth-icon:hover { border-color: var(--accent); color: var(--accent); }
  .auth-icon.active {
    border-color: var(--accent);
    background: var(--accent-glow);
    color: var(--accent);
  }

  /* ── Round header ── */
  .round-header {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.1rem;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .round-header .meta { flex: 1; min-width: 0; }
  .round-header .prompt {
    font-family: 'Instrument Serif', serif;
    font-size: 1.35rem;
    color: var(--accent);
    line-height: 1.2;
    margin-bottom: 0.25rem;
    word-break: break-word;
  }
  .round-header .sub {
    color: var(--text-muted);
    font-size: 0.82rem;
  }
  .round-header .close-btn {
    background: var(--danger);
    color: var(--danger-solid);
    border: 1px solid var(--danger-solid);
    border-radius: 6px;
    padding: 0.4rem 0.8rem;
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    flex-shrink: 0;
    transition: opacity 0.15s;
    display: none;
  }
  .round-header.admin-mode .close-btn { display: block; }
  .round-header .close-btn:hover { opacity: 0.75; }

  /* ── Closed banner (no active round) ── */
  .closed-banner {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2.5rem 1.5rem;
    text-align: center;
    margin-bottom: 1.5rem;
  }
  .closed-banner h2 {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-size: 1.6rem;
    color: var(--accent);
    margin-bottom: 0.5rem;
  }
  .closed-banner p {
    color: var(--text-muted);
    font-size: 0.95rem;
    margin-bottom: 1.2rem;
  }
  .closed-banner button {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: var(--radius);
    padding: 0.7rem 1.3rem;
    font-family: inherit;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .closed-banner button:hover { opacity: 0.85; }

  /* ── Podium ranks ── */
  .card.rank-1 { border-color: var(--gold);   box-shadow: inset 0 0 0 1px var(--gold); }
  .card.rank-2 { border-color: var(--silver); box-shadow: inset 0 0 0 1px var(--silver); }
  .card.rank-3 { border-color: var(--bronze); box-shadow: inset 0 0 0 1px var(--bronze); }

  /* ── Past rounds archive ── */
  .past-rounds { margin-top: 3rem; }
  .past-rounds h2 {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-size: 1.3rem;
    color: var(--text-muted);
    margin-bottom: 0.75rem;
    text-align: center;
  }
  .past-round {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.85rem 1rem;
    margin-bottom: 0.5rem;
  }
  .past-round .pr-prompt {
    font-family: 'Instrument Serif', serif;
    font-size: 1.05rem;
    color: var(--text);
    margin-bottom: 0.15rem;
    word-break: break-word;
  }
  .past-round .pr-date {
    color: var(--text-muted);
    font-size: 0.78rem;
    margin-bottom: 0.6rem;
  }
  .past-round .podium {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem 1rem;
    font-size: 0.92rem;
  }
  .past-round .podium .entry { display: inline-flex; gap: 0.35rem; align-items: baseline; }
  .past-round .podium .entry .medal { font-size: 1rem; }
  .past-round .podium .entry .nm { font-weight: 500; }
  .past-round .podium .entry .vt { color: var(--text-muted); font-variant-numeric: tabular-nums; font-size: 0.82rem; }
  .past-round .empty-note { color: var(--text-muted); font-style: italic; font-size: 0.88rem; }

  /* ── Card list ── */
  .cards { display: flex; flex-direction: column; gap: 0.5rem; }

  .card {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.65rem 0.85rem;
    transition: border-color 0.2s, background 0.2s;
    animation: cardIn 0.3s ease-out;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card .name {
    flex: 1;
    font-size: 1rem;
    font-weight: 500;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .vote-btn {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    background: var(--upvote-bg);
    border: 1px solid transparent;
    border-radius: 8px;
    padding: 0.35rem 0.7rem;
    color: var(--text-muted);
    font-family: inherit;
    font-size: 0.88rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }
  .vote-btn:hover { background: var(--upvote-active); color: var(--accent); }
  .vote-btn.voted {
    background: var(--upvote-active);
    border-color: var(--accent);
    color: var(--accent);
  }
  .vote-btn .arrow { font-size: 1rem; line-height: 1; }

  .delete-btn {
    background: var(--danger);
    border: none;
    border-radius: 6px;
    color: var(--danger-solid);
    padding: 0.3rem 0.55rem;
    font-size: 0.85rem;
    cursor: pointer;
    flex-shrink: 0;
    transition: opacity 0.15s;
    display: none;
  }
  .delete-btn:hover { opacity: 0.7; }
  .admin-mode .delete-btn { display: block; }

  .edit-btn {
    background: var(--surface-hover);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-muted);
    padding: 0.3rem 0.55rem;
    font-size: 0.85rem;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s;
    display: none;
  }
  .edit-btn:hover { border-color: var(--accent); color: var(--accent); }
  .admin-mode .edit-btn { display: block; }

  .card .edit-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 0.3rem 0.55rem;
    color: var(--text);
    font-family: inherit;
    font-size: 1rem;
    outline: none;
    min-width: 0;
  }
  .save-btn, .cancel-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 6px;
    padding: 0.3rem 0.6rem;
    font-family: inherit;
    font-size: 0.82rem;
    font-weight: 700;
    cursor: pointer;
    flex-shrink: 0;
  }
  .cancel-btn { background: var(--border); color: var(--text-muted); font-weight: 500; }

  /* ── Empty state ── */
  .empty {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-muted);
    font-size: 0.95rem;
    font-style: italic;
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(100%);
    background: var(--surface);
    border: 1px solid var(--border-accent);
    color: var(--text);
    padding: 0.6rem 1.2rem;
    border-radius: 8px;
    font-size: 0.88rem;
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  /* ── Admin overlay ── */
  .overlay {
    position: fixed;
    inset: 0;
    background: #0008;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    opacity: 0;
    visibility: hidden;
    transition: all 0.2s;
  }
  .overlay.show { opacity: 1; visibility: visible; }
  .overlay-box {
    background: var(--surface);
    border: 1px solid var(--border-accent);
    border-radius: var(--radius);
    padding: 1.5rem;
    width: 90%;
    max-width: 340px;
  }
  .overlay-box h3 {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-size: 1.3rem;
    color: var(--accent);
    margin-bottom: 0.75rem;
  }
  .overlay-box input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 0.8rem;
    color: var(--text);
    font-family: inherit;
    font-size: 0.95rem;
    outline: none;
    margin-bottom: 0.75rem;
  }
  .overlay-box input:focus { border-color: var(--accent); }
  .overlay-box .btn-row { display: flex; gap: 0.5rem; justify-content: flex-end; }
  .overlay-box .btn-row button {
    border: none;
    border-radius: 8px;
    padding: 0.5rem 1rem;
    font-family: inherit;
    font-size: 0.88rem;
    cursor: pointer;
  }
  .overlay-box .btn-cancel {
    background: var(--border);
    color: var(--text-muted);
  }
  .overlay-box .btn-confirm {
    background: var(--accent);
    color: var(--bg);
    font-weight: 700;
  }
  .overlay-box .error {
    color: var(--danger-solid);
    font-size: 0.82rem;
    margin-bottom: 0.5rem;
  }

  /* ── Loading ── */
  .loading {
    text-align: center;
    padding: 3rem;
    color: var(--text-muted);
  }
  .loading::after {
    content: '';
    display: inline-block;
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-left: 0.5rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<button class="auth-icon" id="authBtn" onclick="handleAuthClick()" aria-label="Sign in" title="Sign in">👤</button>

<div class="container">
  <header>
    <h1>Character Suggestions</h1>
    <p>Suggest a character &amp; upvote your favourites</p>
  </header>

  <div id="roundHeader" class="round-header" style="display:none">
    <div class="meta">
      <div class="prompt" id="roundPrompt"></div>
      <div class="sub" id="roundSub"></div>
    </div>
    <button class="close-btn" onclick="closeRound()">Close round</button>
  </div>

  <div id="closedBanner" class="closed-banner" style="display:none">
    <h2 id="closedBannerTitle">Suggestion box closed</h2>
    <p id="closedBannerMsg">Voting closed — next round coming soon.</p>
    <button id="startRoundBtn" onclick="startNewRound()" style="display:none">Start new round</button>
  </div>

  <div id="activeRoundArea" style="display:none">
    <div class="submit-row">
      <input type="text" id="charInput" placeholder="Suggest a character…" maxlength="80" autocomplete="off">
      <button id="submitBtn" onclick="submitSuggestion()">Suggest</button>
    </div>

    <div class="status-bar">
      <span class="count" id="countLabel">—</span>
    </div>

    <div id="list" class="cards">
      <div class="loading" id="loader">Loading</div>
    </div>
  </div>

  <section id="pastRounds" class="past-rounds" style="display:none"></section>
</div>

<div class="toast" id="toast"></div>

<script>
// ╔══════════════════════════════════════════════════╗
// ║  CONFIGURATION — Replace these with your own!   ║
// ╚══════════════════════════════════════════════════╝

const FIREBASE_CONFIG = {

  apiKey: "AIzaSyAo7BEfXaARRFLlxgL4bxdq4KFYwAXUNYs",

  authDomain: "pewp-s-suggestion-box.firebaseapp.com",

  projectId: "pewp-s-suggestion-box",

  storageBucket: "pewp-s-suggestion-box.firebasestorage.app",

  messagingSenderId: "971773489365",

  appId: "1:971773489365:web:bbfecc7dd10cc20d4ef25c",

  measurementId: "G-8T19WTB3LY"

};

// Admin is whoever signs in with this Google account.
// Real enforcement lives in the Firestore security rules — this
// constant is only used to show/hide UI affordances.
const ADMIN_EMAIL = "pewposterous@gmail.com";

// ════════════════════════════════════════════════════

firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.firestore();
const roundsRef = db.collection("rounds");
const suggestionsRef = db.collection("suggestions");
const auth = firebase.auth();

let allRounds = [];
let activeRound = null;
let pastRounds = [];
let suggestions = [];
let suggestionsUnsubscribe = null;
let isAdmin = false;
let editingId = null;
let myVotes = JSON.parse(localStorage.getItem("votes") || "{}");

const roundHeaderEl = document.getElementById("roundHeader");
const roundPromptEl = document.getElementById("roundPrompt");
const roundSubEl = document.getElementById("roundSub");
const closedBannerEl = document.getElementById("closedBanner");
const closedBannerMsgEl = document.getElementById("closedBannerMsg");
const startRoundBtnEl = document.getElementById("startRoundBtn");
const activeRoundAreaEl = document.getElementById("activeRoundArea");
const pastRoundsEl = document.getElementById("pastRounds");
const listEl = document.getElementById("list");
const countLabel = document.getElementById("countLabel");
const charInput = document.getElementById("charInput");
const submitBtn = document.getElementById("submitBtn");
const authBtn = document.getElementById("authBtn");

// ── Rounds listener (single source of truth for round state) ──
roundsRef.orderBy("createdAt", "desc").onSnapshot((snap) => {
  allRounds = [];
  snap.forEach((doc) => allRounds.push({ id: doc.id, ...doc.data() }));
  const newActive = allRounds.find((r) => r.state === "open") || null;
  pastRounds = allRounds.filter((r) => r.state === "closed");

  // Rebind suggestions listener when active round changes
  const activeId = newActive ? newActive.id : null;
  const prevId = activeRound ? activeRound.id : null;
  if (activeId !== prevId) {
    if (suggestionsUnsubscribe) { suggestionsUnsubscribe(); suggestionsUnsubscribe = null; }
    suggestions = [];
    if (activeId) {
      suggestionsUnsubscribe = suggestionsRef
        .where("roundId", "==", activeId)
        .orderBy("votes", "desc")
        .onSnapshot((s) => {
          suggestions = [];
          s.forEach((d) => suggestions.push({ id: d.id, ...d.data() }));
          render();
        }, (err) => {
          console.error("Suggestions listener error:", err);
          toast("Connection error — check console");
        });
    }
  }
  activeRound = newActive;
  render();
}, (err) => {
  console.error("Rounds listener error:", err);
});

// ── Render ──
function render() {
  document.getElementById("loader")?.remove();

  if (activeRound) {
    // Active round view
    closedBannerEl.style.display = "none";
    roundHeaderEl.style.display = "flex";
    activeRoundAreaEl.style.display = "block";

    const idx = allRounds.length - allRounds.indexOf(activeRound);
    const dateStr = activeRound.createdAt
      ? `Opened ${formatDate(activeRound.createdAt.toDate())}`
      : "Just opened";
    roundPromptEl.textContent = activeRound.prompt;
    roundSubEl.textContent = `Round #${idx} • ${dateStr}`;
    roundHeaderEl.classList.toggle("admin-mode", isAdmin);

    countLabel.textContent = `${suggestions.length} suggestion${suggestions.length !== 1 ? "s" : ""}`;

    if (suggestions.length === 0) {
      listEl.className = isAdmin ? "cards admin-mode" : "cards";
      listEl.innerHTML = `<div class="empty">No suggestions yet — be the first!</div>`;
    } else {
      listEl.className = isAdmin ? "cards admin-mode" : "cards";
      listEl.innerHTML = suggestions.map((s, i) => {
        const voted = myVotes[s.id] ? "voted" : "";
        const rank = i < 3 ? ` rank-${i + 1}` : "";
        if (editingId === s.id) {
          return `
            <div class="card${rank}">
              <input class="edit-input" id="editInput-${s.id}" type="text" maxlength="80" value="${esc(s.name)}">
              <button class="save-btn" onclick="saveEdit('${s.id}')">Save</button>
              <button class="cancel-btn" onclick="cancelEdit()">Cancel</button>
            </div>`;
        }
        return `
          <div class="card${rank}">
            <span class="name">${esc(s.name)}</span>
            <button class="vote-btn ${voted}" onclick="vote('${s.id}')">
              <span class="arrow">▲</span> ${s.votes}
            </button>
            <button class="edit-btn" onclick="startEdit('${s.id}')" title="Edit">✎</button>
            <button class="delete-btn" onclick="remove('${s.id}')" title="Delete">✕</button>
          </div>`;
      }).join("");

      if (editingId) {
        const inp = document.getElementById(`editInput-${editingId}`);
        if (inp) {
          inp.focus();
          inp.setSelectionRange(inp.value.length, inp.value.length);
          inp.addEventListener("keydown", (e) => {
            if (e.key === "Enter") saveEdit(editingId);
            else if (e.key === "Escape") cancelEdit();
          });
        }
      }
    }
  } else {
    // No active round
    roundHeaderEl.style.display = "none";
    activeRoundAreaEl.style.display = "none";
    closedBannerEl.style.display = "block";
    closedBannerMsgEl.textContent = isAdmin
      ? "Open a new round when you're ready."
      : "Voting closed — next round coming soon.";
    startRoundBtnEl.style.display = isAdmin ? "inline-block" : "none";
  }

  renderPastRounds();
}

function renderPastRounds() {
  if (pastRounds.length === 0) {
    pastRoundsEl.style.display = "none";
    pastRoundsEl.innerHTML = "";
    return;
  }
  pastRoundsEl.style.display = "block";
  const medals = ["🥇", "🥈", "🥉"];
  pastRoundsEl.innerHTML = `<h2>Past rounds</h2>` + pastRounds.map((r) => {
    const date = r.closedAt ? formatDate(r.closedAt.toDate()) : "";
    const top3 = Array.isArray(r.top3) ? r.top3 : [];
    const podium = top3.length === 0
      ? `<div class="empty-note">No suggestions submitted.</div>`
      : `<div class="podium">${top3.map((e, i) =>
          `<span class="entry"><span class="medal">${medals[i]}</span><span class="nm">${esc(e.name)}</span><span class="vt">· ${e.votes}</span></span>`
        ).join("")}</div>`;
    return `
      <div class="past-round">
        <div class="pr-prompt">${esc(r.prompt)}</div>
        <div class="pr-date">Closed ${date}</div>
        ${podium}
      </div>`;
  }).join("");
}

function formatDate(d) {
  return d.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
}

// ── Submit ──
async function submitSuggestion() {
  if (!activeRound) {
    toast("No active round");
    return;
  }
  const name = charInput.value.trim();
  if (!name) return;

  // Duplicate check (case-insensitive)
  const dupe = suggestions.find(s => s.name.toLowerCase() === name.toLowerCase());
  if (dupe) {
    toast("That character has already been suggested!");
    return;
  }

  submitBtn.disabled = true;
  try {
    await suggestionsRef.add({
      roundId: activeRound.id,
      name: name,
      votes: 0,
      created: firebase.firestore.FieldValue.serverTimestamp()
    });
    charInput.value = "";
    toast("Suggestion added!");
  } catch (e) {
    console.error(e);
    toast("Error — check console");
  }
  submitBtn.disabled = false;
}

charInput.addEventListener("keydown", e => {
  if (e.key === "Enter") submitSuggestion();
});

// ── Vote (toggle) ──
// Transactional read-then-write so the new count is computed from
// the *actual* current value (prevents votes < 0, self-heals stale
// localStorage). Local state is updated OPTIMISTICALLY before the
// transaction so rapid clicks and concurrent snapshot re-renders
// see a consistent wasVoted, and rolled back if the tx fails.
const votingIds = new Set();

async function vote(id) {
  if (votingIds.has(id)) return;
  votingIds.add(id);

  const wasVoted = !!myVotes[id];
  const docRef = suggestionsRef.doc(id);

  const setLocal = (voted) => {
    if (voted) myVotes[id] = true;
    else delete myVotes[id];
    localStorage.setItem("votes", JSON.stringify(myVotes));
  };
  setLocal(!wasVoted);

  try {
    const nowVoted = await db.runTransaction(async (tx) => {
      const snap = await tx.get(docRef);
      if (!snap.exists) return wasVoted;
      const current = snap.data().votes || 0;

      if (wasVoted && current > 0) {
        tx.update(docRef, { votes: current - 1 });
        return false;
      }
      tx.update(docRef, { votes: current + 1 });
      return true;
    });
    setLocal(nowVoted);
  } catch (e) {
    setLocal(wasVoted);
    console.error(e);
    toast("Vote failed");
  } finally {
    votingIds.delete(id);
  }
}

// ── Delete (admin) ──
async function remove(id) {
  if (!isAdmin || !activeRound) return;
  try {
    await suggestionsRef.doc(id).delete();
    delete myVotes[id];
    localStorage.setItem("votes", JSON.stringify(myVotes));
    toast("Deleted");
  } catch (e) {
    console.error(e);
    toast("Delete failed");
  }
}

// ── Round lifecycle (admin) ──
async function startNewRound() {
  if (!isAdmin) return;
  if (activeRound) {
    toast("There's already an open round");
    return;
  }
  let prompt = window.prompt("Round prompt (theme/question for Patreons):");
  if (prompt === null) return;
  prompt = prompt.trim();
  if (!prompt) {
    toast("Prompt can't be empty");
    return;
  }
  if (prompt.length > 120) {
    toast("Prompt must be 120 characters or less");
    return;
  }
  try {
    await roundsRef.add({
      prompt,
      state: "open",
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      closedAt: null,
      top3: null
    });
    toast("Round opened");
  } catch (e) {
    console.error(e);
    toast("Could not start round — check console");
  }
}

async function closeRound() {
  if (!isAdmin || !activeRound) return;
  if (!window.confirm("Close this round? The top 3 will be locked in and the round archived.")) return;
  const top3 = suggestions.slice(0, 3).map((s) => ({
    id: s.id,
    name: s.name,
    votes: s.votes
  }));
  try {
    await roundsRef.doc(activeRound.id).update({
      state: "closed",
      closedAt: firebase.firestore.FieldValue.serverTimestamp(),
      top3
    });
    toast("Round closed");
  } catch (e) {
    console.error(e);
    toast("Could not close round — check console");
  }
}

// ── Auth (Google Sign-In) ──
// Real admin enforcement is in Firestore rules. This UI just
// reflects the current auth state.
auth.onAuthStateChanged((user) => {
  isAdmin = !!(user && user.email === ADMIN_EMAIL && user.emailVerified);
  authBtn.classList.toggle("active", isAdmin);
  authBtn.setAttribute("title", user ? "Sign out" : "Sign in");
  authBtn.setAttribute("aria-label", user ? "Sign out" : "Sign in");
  if (editingId) editingId = null;
  render();
});

function handleAuthClick() {
  if (auth.currentUser) {
    auth.signOut().catch((e) => { console.error(e); toast("Sign-out failed"); });
  } else {
    auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())
      .then(({ user }) => {
        if (user.email !== ADMIN_EMAIL) {
          toast("Signed in, but not the admin account");
        } else {
          toast("Signed in");
        }
      })
      .catch((e) => {
        if (e.code !== "auth/popup-closed-by-user") {
          console.error(e);
          toast("Sign-in failed");
        }
      });
  }
}

// ── Rename (admin) ──
function startEdit(id) {
  if (!isAdmin) return;
  editingId = id;
  render();
}

function cancelEdit() {
  editingId = null;
  render();
}

async function saveEdit(id) {
  if (!isAdmin || !activeRound) return;
  const inp = document.getElementById(`editInput-${id}`);
  if (!inp) return;
  const newName = inp.value.trim();
  if (!newName) {
    toast("Name can't be empty");
    return;
  }
  const current = suggestions.find((s) => s.id === id);
  if (current && current.name === newName) {
    editingId = null;
    render();
    return;
  }
  try {
    await suggestionsRef.doc(id).update({ name: newName });
    editingId = null;
    toast("Renamed");
  } catch (e) {
    console.error(e);
    toast("Rename failed");
  }
}

// ── Helpers ──
function esc(str) {
  const d = document.createElement("div");
  d.textContent = str;
  return d.innerHTML;
}

function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove("show"), 2200);
}
</script>
</body>
</html>
